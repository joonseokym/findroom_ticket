name: Update Colory Ranking

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정(UTC) 실행 -> 한국 시간 오전 9시
  workflow_dispatch: # 수동 실행 가능하도록 추가

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리 쓰기 권한 부여

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml beautifulsoup4

      - name: Run ranking scraper
        run: python scripts/update_ranking.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/ranking.json
          git commit -m "Update ranking data [skip ci]" || echo "No changes to commit"
          git push
