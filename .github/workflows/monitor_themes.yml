name: Monitor Keyescape Themes

on:
  schedule:
    - cron: '20 */6 * * *'
  workflow_dispatch:

jobs:
  monitor-themes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check theme inventory
        id: monitor
        run: python scripts/check_theme_inventory.py

      - name: Commit monitor report if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/theme_inventory.json data/theme_changes.json data/theme_changes.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update theme inventory monitor report [skip ci]"
          git push

      - name: Open issue when theme list changes
        if: steps.monitor.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="[자동 감시] 키이스케이프 테마 목록 변경 감지"
          existing_issue="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // ""')"
          if [ -n "$existing_issue" ]; then
            echo "Open issue already exists: #$existing_issue"
            exit 0
          fi
          gh issue create \
            --title "$title" \
            --body-file data/theme_changes.md
