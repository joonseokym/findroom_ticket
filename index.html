<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키이스케이프 예약 직링 매크로</title>
    <!-- Google Fonts Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Enhanced 리퀴드 글라스 (Glassmorphism) UI 스타일 */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05); /* 더 투명하게 */
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.15);
            --btn-active: rgba(255, 255, 255, 0.25);
            --text-color: #f8f9fa;
            --text-muted: #adb5bd;
            --accent-start: #00c6ff;
            --accent-end: #0072ff;
            --accent-glow: rgba(0, 198, 255, 0.5);
            --bg-color-1: #0f2027;
            --bg-color-2: #203a43;
            --bg-color-3: #2c5364;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Outfit', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 50%, var(--bg-color-3) 100%);
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 배경 장식 원형 요소 */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }
        
        .circle-1 {
            width: 300px;
            height: 300px;
            background: #00c6ff;
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }
        
        .circle-2 {
            width: 400px;
            height: 400px;
            background: #9d50bb;
            bottom: -100px;
            right: -100px;
            animation-duration: 15s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 650px;
            box-shadow: var(--glass-shadow), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 16px;
            margin-bottom: 35px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .theme-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 14px 28px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
            letter-spacing: 0.5px;
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2),
                        inset 0 1px 1px rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }

        .theme-buttons button.active {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: #fff;
            font-weight: 700;
            border-color: transparent;
            box-shadow: 0 0 20px var(--accent-glow), 
                        inset 0 2px 2px rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .time-container {
            display: none;
            margin-bottom: 40px;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .time-container.active {
            display: block;
        }

        .time-container h3 {
            font-size: 15px;
            margin-bottom: 20px;
            font-weight: 300;
            color: var(--text-muted);
        }

        .time-container h3 .highlight-text {
            color: #fff;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-start), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .time-btn {
            padding: 14px 10px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 14px;
            letter-spacing: 1px;
        }

        .time-btn.selected {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.1),
                        inset 0 0 0 1px rgba(255,255,255,0.3);
            transform: scale(1.03);
            position: relative;
        }

        .time-btn.selected::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(45deg, var(--accent-start), transparent);
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submit-section {
            padding-top: 35px;
            position: relative;
        }
        
        .submit-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: #fff;
            font-weight: 700;
            font-size: 20px;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.4),
                        inset 0 2px 2px rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 320px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 114, 255, 0.6),
                        inset 0 2px 2px rgba(255,255,255,0.3);
        }

        .submit-btn:hover:not(:disabled)::before {
            left: 150%;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 198, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 198, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 198, 255, 0); }
        }

        .submit-btn:not(:disabled) {
            animation: pulse 2s infinite;
        }

        .submit-btn:disabled {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border: 1px solid rgba(255,255,255,0.1);
            animation: none;
        }

        .status-text {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
            min-height: 20px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .highlight-text {
            color: #fff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Background Decorators -->
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="container">
        <h1>키이스케이프 예약 직링 매크로</h1>
        
        <h2>테마를 선택하세요</h2>
        <div class="theme-buttons">
            <button onclick="selectTheme('EDDY', this)">FILM BY EDDY</button>
            <button onclick="selectTheme('STEVE', this)">FILM BY STEVE</button>
            <button onclick="selectTheme('BOB', this)">FILM BY BOB</button>
        </div>

        <div id="timeWrapper">
            <!-- 선택한 테마의 시간 버튼들이 여기에 나타납니다 -->
        </div>

        <div class="submit-section">
            <form id="reservationForm" action="https://keyescape.com/reservation2.php" method="POST" target="_blank">
                <!-- 기존 폼 데이터 보존 (지점 정보 등) -->
                <input type="hidden" name="zizumNum" value="18">
                <input type="hidden" name="themeNum" id="form-themeNum" value="">
                <input type="hidden" name="themeInfoNum" id="form-themeInfoNum" value="">
                <input type="hidden" name="revDays" value="2026-03-10">
                
                <!-- 자바스크립트로 변경될 동적 데이터 -->
                <input type="hidden" name="themeName" id="form-themeName" value="">
                <input type="hidden" name="revTimes" id="form-revTimes" value="">
                <input type="hidden" name="themeTimeNum" id="form-themeTimeNum" value="">

                <button type="button" class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>직링 연결하기</button>
            </form>
            <div class="status-text" id="statusText">테마와 시간을 선택해주세요.</div>
        </div>
    </div>

    <script>
        // 각 테마별 시간 및 대응하는 themeTimeNum 데이터
        const themesData = {
            'EDDY': {
                name: 'FILM BY EDDY',
                themeNum: '57',
                themeInfoNum: '34',
                times: ['09:15', '10:45', '12:15', '13:45', '15:20', '16:50', '18:20', '19:50', '21:25'],
                nums: ['2107', '1810', '1811', '1812', '1813', '1814', '1815', '1816', '1817']
            },
            'STEVE': {
                name: 'FILM BY STEVE',
                themeNum: '58',
                themeInfoNum: '35',
                times: ['09:40', '10:40', '11:40', '12:40', '13:40', '14:40', '15:40', '16:40', '17:40', '18:40', '19:40', '20:40', '21:40'],
                nums: ['2303', '1828', '1829', '1830', '1831', '1832', '1833', '1834', '1835', '1836', '1837', '2036', '1838']
            },
            'BOB': {
                name: 'FILM BY BOB',
                themeNum: '59',
                themeInfoNum: '36',
                times: ['09:10', '10:35', '12:00', '13:25', '14:50', '16:20', '17:45', '19:15', '20:40', '22:05'],
                nums: ['1983', '1984', '2815', '1985', '2037', '1986', '1987', '2038', '2039', '2040']
            }
        };

        let currentTheme = null;
        let currentTime = null;
        let currentNum = null;

        // 테마 선택 함수
        function selectTheme(themeKey, btnElement) {
            currentTheme = themesData[themeKey];
            currentTime = null;
            currentNum = null;
            
            // 모든 테마 버튼 비활성화 후 클릭된 버튼 활성화
            document.querySelectorAll('.theme-buttons button').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Form 데이터 초기화 및 테마 이름 세팅
            document.getElementById('form-themeName').value = currentTheme.name;
            document.getElementById('form-themeNum').value = currentTheme.themeNum;
            document.getElementById('form-themeInfoNum').value = currentTheme.themeInfoNum;
            document.getElementById('form-revTimes').value = "";
            document.getElementById('form-themeTimeNum').value = "";

            // 해당 테마의 시간 그리드 렌더링
            renderTimeGrid(themeKey);
            updateStatus();
        }

        // 시간 버튼 렌더링 함수
        function renderTimeGrid(themeKey) {
            const wrapper = document.getElementById('timeWrapper');
            const data = themesData[themeKey];
            
            let html = `<div class="time-container active" id="times-${themeKey}">
                            <h3><span class="highlight-text">${data.name}</span> 시간 선택</h3>
                            <div class="time-grid">`;
            
            for(let i=0; i<data.times.length; i++) {
                html += `<button class="time-btn" onclick="selectTime('${data.times[i]}', '${data.nums[i]}', this)">${data.times[i]}</button>`;
            }
            
            html += `</div></div>`;
            wrapper.innerHTML = html;
        }

        // 시간 선택 함수
        function selectTime(time, num, btnElement) {
            currentTime = time;
            currentNum = num;

            // 모든 시간 버튼 선택 해제 후 클릭된 버튼 선택
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');

            // Form 데이터 세팅
            document.getElementById('form-revTimes').value = time;
            document.getElementById('form-themeTimeNum').value = num;

            updateStatus();
        }

        // 상태 텍스트 및 제출 버튼 업데이트
        function updateStatus() {
            const statusText = document.getElementById('statusText');
            const submitBtn = document.getElementById('submitBtn');

            if (currentTheme && currentTime) {
                statusText.innerHTML = `<span class="highlight-text">${currentTheme.name}</span> - <span class="highlight-text">${currentTime}</span> 선택됨`;
                submitBtn.disabled = false;
            } else if (currentTheme) {
                statusText.innerText = "예약할 시간을 선택해주세요.";
                submitBtn.disabled = true;
            } else {
                statusText.innerText = "테마와 시간을 선택해주세요.";
                submitBtn.disabled = true;
            }
        }

        // 폼 제출 (직링 연결하기) 함수
        function submitForm() {
            if (currentTheme && currentTime) {
                // 직링 새 탭에서 열기
                document.getElementById('reservationForm').submit();
            }
        }
    </script>
</body>
</html>
